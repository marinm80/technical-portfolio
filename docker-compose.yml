# Compose para Coolify (Build Pack: Docker Compose, location /docker-compose.yml).
# Coolify enruta el dominio hacia el puerto expuesto vía su propio proxy;
# no se publican puertos en el host ni se fija container_name.
#
# Para probar en local con puerto publicado:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
services:
  portfolio:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # En Coolify: definir estas variables en Environment Variables (se
        # interpolan aquí). En local: compose las lee del .env junto a este
        # archivo. Todas opcionales: sin ellas el sitio corre en modo degradado.
        VITE_WP_API_URL: ${VITE_WP_API_URL:-}
        VITE_EMAILJS_SERVICE_ID: ${VITE_EMAILJS_SERVICE_ID:-}
        VITE_EMAILJS_TEMPLATE_ID: ${VITE_EMAILJS_TEMPLATE_ID:-}
        VITE_EMAILJS_PUBLIC_KEY: ${VITE_EMAILJS_PUBLIC_KEY:-}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - rafael-network

networks:
  # Red compartida del ecosistema rafaelmarin.dev: este stack la crea (nombre
  # fijo, sin prefijo de proyecto) y otros stacks de la misma red (p. ej. el
  # blog WordPress) la declaran así:
  #
  #   networks:
  #     rafael-network:
  #       external: true
  rafael-network:
    name: rafael-network
