<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Anti-FOUC: aplica el tema antes del primer paint -->
    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        var dark = stored ? stored === "dark" : !window.matchMedia("(prefers-color-scheme: light)").matches;
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>

    <!-- SEO Meta Tags -->
    <title>Rafael Marin | Full Stack Developer</title>
    <meta name="description" content="Portafolio técnico de Rafael Marin. Full Stack Developer especializado en React y Node.js. Construyendo sistemas escalables y arquitecturas limpias." />
    <meta name="keywords" content="Full Stack Developer, React, Node.js, TypeScript, Desarrollador Web, Docker, Linux" />
    <meta name="author" content="Rafael Marin" />
    <link rel="canonical" href="https://rafaelmarin.dev/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rafaelmarin.dev/" />
    <meta property="og:title" content="Rafael Marin | Full Stack Developer" />
    <meta property="og:description" content="Portafolio técnico y blog sobre desarrollo full stack." />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://rafaelmarin.dev/" />
    <meta property="twitter:title" content="Rafael Marin | Full Stack Developer" />
    <meta property="twitter:description" content="Portafolio técnico y blog sobre desarrollo full stack." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

</html>
