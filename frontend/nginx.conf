# Nginx interno del contenedor. El TLS termina en Traefik/Coolify,
# por eso se escucha en 80 y HSTS se configura en el proxy, no aquí.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;

    # Nota: add_header dentro de un location suprime los del bloque server,
    # por eso los headers de seguridad se repiten en cada location.

    # Assets con hash de Vite: cache inmutable de 1 año
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # script-src 'unsafe-inline' es necesario por el script anti-FOUC del index.html.
        # connect-src: EmailJS + API de WordPress (ajustar el host del blog al desplegarlo).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.emailjs.com https://blog.rafaelmarin.dev; base-uri 'self'; form-action 'self'" always;
    }
}
